
name: Docker Image CI

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Show directory contents
        run: ls -R

      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Download dependencies
        run: go mod download

      #     - name: Run tests
      #       run: go test -v ./...

      - name: Build binary
        run: go build -o ./cmd/visa_direct ./cmd/main.go

      - name: Build and push Docker image
        uses: mr-smithers-excellent/docker-build-push@v4
        with:
          image: mhthrh/visa_direct
          tag: latest
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Deploy on server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 40.82.171.243
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            sudo docker pull mhthrh/visa_direct:latest
            sudo docker stop visa_direct || true
            sudo docker rm visa_direct || true
            sudo docker run -d --name visa_direct -p 80:80 mhthrh/visa_direct:latest
